name: Sync upstream & publish

# One-dragon automation: on a schedule, check whether the upstream author has
# published a NEW RELEASE. If so, build the rpms for that release (x86_64 +
# aarch64) and republish the dnf repo. We track upstream releases (tags), NOT
# master commits, so builds happen only when a real version ships — never on
# every upstream commit. Fully hands-off; users get the update via dnf.
on:
  schedule:
    - cron: '0 6 * * *'   # daily, 06:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: Build & publish even if no new upstream release
        type: boolean
        default: false

permissions:
  contents: write
  pages: write

jobs:
  detect:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      tag: ${{ steps.check.outputs.tag }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for a new upstream release
        id: check
        env:
          FORK_SLUG: ${{ github.repository }}
          FORCE: ${{ inputs.force && '1' || '0' }}
        run: bash tools/fedora/check-upstream-release.sh

  release:
    needs: detect
    if: needs.detect.outputs.changed == 'true'
    uses: ./.github/workflows/fedora_repo.yml
    with:
      ref: ${{ github.sha }}
      upstream_tag: ${{ needs.detect.outputs.tag }}
    secrets: inherit

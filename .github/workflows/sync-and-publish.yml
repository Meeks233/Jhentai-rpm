name: Sync upstream & publish

# One-dragon automation: on a schedule, check whether the upstream author has
# published a NEW RELEASE. If so, build the rpms for that release (x86_64 +
# aarch64) and republish the dnf repo. We track upstream releases (tags), NOT
# master commits, so builds happen only when a real version ships — never on
# every upstream commit. Fully hands-off; users get the update via dnf.
on:
  schedule:
    # Upstream release times are irregular (mostly ~12-14 UTC, but some land in
    # the early-morning 02-07 UTC window). A single daily run lagged a release
    # by up to ~8h. Poll every 4h instead: detection is a ~5s no-op unless the
    # tag actually changed, so frequent checks are effectively free and cap the
    # packaging lag at ~4h + GitHub's scheduler delay.
    - cron: '0 */4 * * *'   # every 4 hours (00,04,08,12,16,20 UTC)
  workflow_dispatch:
    inputs:
      force:
        description: Build & publish even if no new upstream release
        type: boolean
        default: false

# NOTE: do NOT declare `concurrency: fedora-repo` here. This workflow *calls*
# fedora_repo.yml as a reusable workflow, and that callee already claims the
# `fedora-repo` group. If the caller held the same group too, the callee could
# never acquire it -> concurrency deadlock and the release job is never created.
# Serialization on the release assets / gh-pages is handled by the callee's own
# concurrency block, which also covers independent tag-push builds.

permissions:
  contents: write
  pages: write

jobs:
  detect:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      tag: ${{ steps.check.outputs.tag }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for a new upstream release
        id: check
        env:
          FORK_SLUG: ${{ github.repository }}
          FORCE: ${{ inputs.force && '1' || '0' }}
        run: bash tools/fedora/check-upstream-release.sh

  release:
    needs: detect
    if: needs.detect.outputs.changed == 'true'
    uses: ./.github/workflows/fedora_repo.yml
    with:
      ref: ${{ github.sha }}
      upstream_tag: ${{ needs.detect.outputs.tag }}
    secrets: inherit

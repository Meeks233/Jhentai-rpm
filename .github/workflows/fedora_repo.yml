name: Publish Fedora dnf repo

# Builds the signed .rpm for x86_64 and aarch64, uploads them to the rolling
# "repo" release, then regenerates the dnf metadata (pointing at the release
# download URLs) and publishes it to gh-pages. Fork-only workflow: it uses the
# committed jh_api_secret_config.dart as-is and needs only the GPG signing key.
on:
  push:
    tags:
      - v*
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: Git ref/sha to checkout for packaging
        type: string
        default: ''
      upstream_tag:
        description: Upstream release tag whose code to build (overlaid on packaging)
        type: string
        default: ''

concurrency:
  group: fedora-repo
  cancel-in-progress: false

permissions:
  contents: write
  pages: write

env:
  FLUTTER_VERSION: 3.24.4
  GPG_NAME: JHenTai Fedora Repo

jobs:
  # ---- Stage 1: build + sign + upload one package per architecture ----------
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x86_64
          - os: ubuntu-22.04-arm
            arch: aarch64
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      # Build the upstream RELEASE code, not our (frozen) packaging branch:
      # overlay the tag's tree on top of our checkout, keeping the additive
      # packaging files (which the tag does not contain) in place.
      - name: Overlay upstream release code
        if: inputs.upstream_tag != ''
        env:
          UPSTREAM_TAG: ${{ inputs.upstream_tag }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git remote add upstream https://github.com/jiangtian616/JHenTai 2>/dev/null || true
          git fetch --depth 1 upstream tag "$UPSTREAM_TAG"
          git checkout "$UPSTREAM_TAG" -- .
          echo "Building upstream $UPSTREAM_TAG (pubspec: $(head -n 5 pubspec.yaml | tail -n 1))"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'master'
          cache: true

      - name: Install packaging deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libfuse2 webkit2gtk-4.1 rpm

      - name: Flutter pub get
        run: flutter pub get

      - name: Import GPG signing key
        env:
          RPM_GPG_PRIVATE_KEY: ${{ secrets.RPM_GPG_PRIVATE_KEY }}
          RPM_GPG_PASSPHRASE: ${{ secrets.RPM_GPG_PASSPHRASE }}
        run: |
          printf '%s' "$RPM_GPG_PRIVATE_KEY" | gpg --batch --import
          install -m 600 /dev/null "$RUNNER_TEMP/gpg_passphrase"
          printf '%s' "$RPM_GPG_PASSPHRASE" > "$RUNNER_TEMP/gpg_passphrase"

      - name: Build, sign and upload package
        env:
          GPG_PASSPHRASE_FILE: ${{ runner.temp }}/gpg_passphrase
        run: |
          bash rpm.sh
          rpm=$(ls build/linux/*.rpm | head -1)
          bash tools/fedora/sign-and-upload.sh "$rpm"

  # ---- Stage 2: regenerate metadata over all packages and publish -----------
  publish:
    needs: build
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}
          fetch-depth: 0

      - name: Install repo tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y createrepo-c rpm

      - name: Import GPG signing key
        env:
          RPM_GPG_PRIVATE_KEY: ${{ secrets.RPM_GPG_PRIVATE_KEY }}
          RPM_GPG_PASSPHRASE: ${{ secrets.RPM_GPG_PASSPHRASE }}
        run: |
          printf '%s' "$RPM_GPG_PRIVATE_KEY" | gpg --batch --import
          install -m 600 /dev/null "$RUNNER_TEMP/gpg_passphrase"
          printf '%s' "$RPM_GPG_PASSPHRASE" > "$RUNNER_TEMP/gpg_passphrase"

      - name: Build metadata and publish to gh-pages
        env:
          GPG_PASSPHRASE_FILE: ${{ runner.temp }}/gpg_passphrase
        run: |
          git config --global user.name "JHenTai Fedora Bot"
          git config --global user.email "shadowblaze_kai@icloud.com"
          bash tools/fedora/build-metadata.sh
